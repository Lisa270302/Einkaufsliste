<script>
  // Persistenz: window.storage via localStorage (ersetzt die Claude-Umgebung)
  window.storage = {
    async get(k){ try { var v = localStorage.getItem("wkstore:"+k); return v==null?null:{key:k,value:v}; } catch(e){ return null; } },
    async set(k,v){ try { localStorage.setItem("wkstore:"+k, v); } catch(e){} return {key:k,value:v}; },
    async delete(k){ try { localStorage.removeItem("wkstore:"+k); } catch(e){} return {key:k,deleted:true}; },
    async list(prefix){ var keys=[]; try { for (var i=0;i<localStorage.length;i++){ var kk=localStorage.key(i); if(kk&&kk.indexOf("wkstore:")===0){ var real=kk.slice(8); if(!prefix||real.indexOf(prefix)===0) keys.push(real); } } } catch(e){} return {keys:keys}; }
  };
</script>

];
const PLANT_HINTS = ["vegan", "hafer", "soja", "pflanz", "kokos", "mandel", "creme vega"];

function applySubs(name, diet) {
  if (!name) return name;
  const low = name.toLowerCase();
  if (PLANT_HINTS.some((h) => low.includes(h))) return name; // schon pflanzlich
  const types = diet === "vegetarisch" ? ["meat"] : ["meat", "dairy"];
  for (const s of SUBSTITUTIONS) {
    if (types.includes(s.type) && low.includes(s.match)) return s.to;
  }
  return name;
}

/* ------------------------------------------------------------------ *
 *  Storage helpers (persistent über Wochen hinweg)
 * ------------------------------------------------------------------ */
async function loadKey(key, fallback) {
  try {
    const r = await window.storage.get(key);
    return r && r.value ? JSON.parse(r.value) : fallback;
  } catch { return fallback; }
}
async function saveKey(key, value) {
  try { await window.storage.set(key, JSON.stringify(value)); } catch (e) { console.error("save", e); }
}

/* ------------------------------------------------------------------ *
 *  Hilfsfunktionen
 * ------------------------------------------------------------------ */
function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (date.getUTCDay() + 6) % 7;
  date.setUTCDate(date.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(date.getUTCFullYear(), 0, 4));
  const diff = (date - firstThursday) / 86400000;
  return 1 + Math.round((diff - 3 + ((firstThursday.getUTCDay() + 6) % 7)) / 7);
}

function effectiveStore(it, rules) {
  const name = (it.name || "").toLowerCase();
  for (const r of rules || []) {
    if (r.keyword && name.includes(r.keyword.toLowerCase())) return "Spar";
  }
  return it.store || "Hofer";
}

  const rules = library.storeRules || [];
  const items = [];
  library.essentials.forEach((e) => {
    if ((e.freq || "weekly") === "biweekly" && !includeBiweekly) return;
    items.push(e);

  library.recipes
    .filter((r) => selectedIds.includes(r.id))
    .forEach((r) => r.ingredients.forEach((i) => items.push(i)));

  // Schritt 1: pro Geschäft + Name + Einheit die Mengen summieren
  const byUnit = new Map();
  items.forEach((it) => {
    const name = (it.name || "").trim();
    if (!name) return;
    const store = effectiveStore(it, rules);
    const unit = (it.unit || "").trim();
    const nameKey = name.toLowerCase();
    const uKey = `${store}|${nameKey}|${unit.toLowerCase()}`;
    const qtyNum = parseFloat(String(it.qty).replace(",", "."));
    if (byUnit.has(uKey)) {
      const ex = byUnit.get(uKey);
      if (!isNaN(qtyNum)) ex.qty = (ex.qty === null ? 0 : ex.qty) + qtyNum;
    } else {
      byUnit.set(uKey, {
        name, unit, store, nameKey,
        category: it.category || "Sonstiges",
        qty: isNaN(qtyNum) ? null : qtyNum,
      });
    }
  });

  // Schritt 2: gleiche Zutat (Geschäft + Name) zu EINER Zeile verschmelzen;
  // bei gemischten Einheiten gewinnt die Packungs-/Stück-Einheit (z. B. 100 g + 1 Pkg → 1 Pkg)
  const byName = new Map();
  Array.from(byUnit.values()).forEach((v) => {
    const gKey = `${v.store}|${v.nameKey}`;
    if (!byName.has(gKey)) byName.set(gKey, []);
    byName.get(gKey).push(v);
  });

  const result = [];
  byName.forEach((variants, gKey) => {
    const chosen = variants.length === 1
      ? variants[0]
      : variants.slice().sort((a, b) => {
          const ra = unitRank(a.unit), rb = unitRank(b.unit);
          if (ra !== rb) return ra - rb;          // diskrete Einheit (Pkg/Stk) zuerst
          return (b.qty || 0) - (a.qty || 0);     // sonst die größere Menge
        })[0];
    result.push({
      key: gKey,
      name: chosen.name,
      unit: chosen.unit,
      store: chosen.store,
      category: chosen.category,
      qty: chosen.qty,
    });
  });
  return result;
}

function groupByCategory(list, categories) {
  const groups = [];
  categories.forEach((cat) => {
    const its = list
      .filter((i) => i.category === cat)
      .sort((a, b) => a.name.localeCompare(b.name, "de"));
    if (its.length) groups.push({ cat, items: its });
  });
  const leftover = list
    .filter((i) => !categories.includes(i.category))
    .sort((a, b) => a.name.localeCompare(b.name, "de"));
  if (leftover.length) groups.push({ cat: "Sonstiges", items: leftover });
  return groups;
}

const fmtQty = (it) => {
  if (it.qty === null || it.qty === undefined) return it.name;
  const q = Number.isInteger(it.qty) ? it.qty : Math.round(it.qty * 100) / 100;
  return `${q}${it.unit ? " " + it.unit : ""} ${it.name}`;
};

/* ---- Bild (Screenshot/Foto) → verkleinertes JPEG-base64 ---- */
function fileToJpegBase64(file, maxDim = 1280) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL("image/jpeg", 0.85).split(",")[1]);
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Bild nicht lesbar")); };
    img.src = url;
  });
}

/* ---- KI-Aufruf (Claude in Claude) ---- */
async function callClaude(messages, opts = {}) {
  const { maxTokens = 2048 } = opts;
  let key = "", model = "gemini-2.5-flash";
  try { key = localStorage.getItem("wk:geminiKey") || ""; } catch (_) {}
  try { model = localStorage.getItem("wk:geminiModel") || "gemini-2.5-flash"; } catch (_) {}
  if (!key) throw new Error("Kein Gemini-Schluessel hinterlegt - trag ihn in den Einstellungen ein");

  const msg = messages[0] || { content: "" };
  const parts = [];
  if (typeof msg.content === "string") {
    parts.push({ text: msg.content });
  } else if (Array.isArray(msg.content)) {
    msg.content.forEach((b) => {
      if (b.type === "text") parts.push({ text: b.text });
      else if (b.type === "image" && b.source) parts.push({ inline_data: { mime_type: b.source.media_type || "image/jpeg", data: b.source.data } });
    });
  }

  const url = "https://generativelanguage.googleapis.com/v1beta/models/" + encodeURIComponent(model) + ":generateContent?key=" + encodeURIComponent(key);
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ role: "user", parts }],
      generationConfig: { maxOutputTokens: maxTokens, temperature: 0.7, responseMimeType: "application/json" },
    }),
  });
  if (!res.ok) {
    let detail = "";
    try { detail = (await res.text()).slice(0, 200); } catch (_) {}
    throw new Error("API " + res.status + (detail ? " - " + detail : ""));
  }
  const data = await res.json();
  const cand = (data.candidates || [])[0];
  const text = cand && cand.content && cand.content.parts ? cand.content.parts.map((p) => p.text || "").join("") : "";
  if (!text.trim()) throw new Error("leere Antwort");
  return text;
}
function extractJSON(text) {
  let t = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const starts = [t.indexOf("{"), t.indexOf("[")].filter((x) => x >= 0);
  const ends = [t.lastIndexOf("}"), t.lastIndexOf("]")].filter((x) => x >= 0);
  if (!starts.length || !ends.length) throw new Error("kein JSON");
  return JSON.parse(t.slice(Math.min(...starts), Math.max(...ends) + 1));
}
function normalizeRecipe(r, categories, diet) {
  return {
    id: uid(),
    name: (r.name || "Neues Rezept").trim(),
    tag: r.tag || "",
    desc: (r.desc || r.description || "").trim(),
    ingredients: (r.ingredients || []).map((i) =>
      ing(
        applySubs((i.name || "").trim(), diet),
        i.qty ?? "",
        i.unit || "",
        categories.includes(i.category) ? i.category : "Sonstiges",
        STORES.includes(i.store) ? i.store : "Hofer"
      )
    ).filter((i) => i.name),
  };
}

  // laden

    (async () => {
      const lib = await loadKey("kitchen:library", null);
      const wk = await loadKey("kitchen:week", null);
      if (lib) {
        const sv = lib.seedVersion || 1;

        let recipes = Array.isArray(lib.recipes) ? lib.recipes : [];

        if (sv < SEED_VERSION) {
          const defByName = new Map(DEFAULT_RECIPES.map((d) => [d.name, d]));
          recipes = recipes
            .filter((r) => !OLD_PLACEHOLDERS.includes(r.name))
            .map((r) => (defByName.has(r.name) ? defByName.get(r.name) : { ...r, ingredients: migIngs(r.ingredients) }));
          const have = new Set(recipes.map((r) => r.name));
          DEFAULT_RECIPES.forEach((d) => { if (!have.has(d.name)) recipes = [...recipes, d]; });

          categories = DEFAULT_CATEGORIES;
          storeRules = DEFAULT_STORE_RULES;

    })();

  useEffect(() => { if (loaded) saveKey("kitchen:week", week); }, [week, loaded]);

  const kw = isoWeek(new Date());

  return (

      <header className="max-w-5xl mx-auto px-4 pt-7 pb-4">
        <div className="flex items-end justify-between flex-wrap gap-3">
          <div>
            <div className="eyebrow text-emerald-700">Hofer &amp; Spar · für zwei</div>

            <div className="wordmark text-2xl text-emerald-700 leading-none">KW {kw}</div>

          <Tab id="rezepte" tab={tab} setTab={setTab} icon={<BookOpen size={16} />} label="Rezepte" />

function ShoppingList({ library, week, setWeek }) {
  const includeBiweekly = week.includeBiweekly ?? (isoWeek(new Date()) % 2 === 0);
  const allRaw = useMemo(() => aggregate(library, week.selectedIds, includeBiweekly), [library, week.selectedIds, includeBiweekly]);
  const removed = week.removed || {};
  const pantryRules = library.pantryRules || [];
  const isPantry = (it) => pantryRules.some((r) => r.keyword && it.name.toLowerCase().includes(r.keyword.toLowerCase()));
  const pantryNeeded = week.pantryNeeded || {};
  const all = useMemo(() => allRaw.filter((i) => !removed[i.key] && (!isPantry(i) || pantryNeeded[i.key])), [allRaw, week.removed, week.pantryNeeded, library.pantryRules]);
  const removedList = useMemo(() => allRaw.filter((i) => removed[i.key]), [allRaw, week.removed]);
  const hofer = useMemo(() => groupByCategory(all.filter((i) => i.store === "Hofer"), library.categories), [all, library.categories]);
  const spar = useMemo(() => groupByCategory(all.filter((i) => i.store === "Spar"), library.categories), [all, library.categories]);
  const hasBiweekly = (library.essentials || []).some((e) => (e.freq || "weekly") === "biweekly");

  const toggleCheck = (key) =>
    setWeek((w) => ({ ...w, checked: { ...w.checked, [key]: !w.checked[key] } }));
  const removeItem = (key) =>
    setWeek((w) => ({ ...w, removed: { ...(w.removed || {}), [key]: true } }));
  const restoreItem = (key) =>
    setWeek((w) => {
      const r = { ...(w.removed || {}) };
      delete r[key];
      return { ...w, removed: r };
    });

  const total = all.length;
  const done = all.filter((i) => week.checked[i.key]).length;

  const Item = ({ it, markSpar }) => {
    const checked = !!week.checked[it.key];
    return (
      <div className="w-full flex items-center gap-2 py-1.5 group">
        <button onClick={() => toggleCheck(it.key)} className="flex items-center gap-3 flex-1 min-w-0 text-left">
          <span className={`w-5 h-5 rounded-md border-2 flex items-center justify-center shrink-0 transition
            ${checked ? "bg-emerald-500 border-emerald-500" : "border-stone-300 group-hover:border-stone-400"}`}>
            {checked && <Check size={13} strokeWidth={3} className="text-white" />}
          </span>
          <span className={`text-sm ${checked ? "line-through text-stone-300" : "text-stone-700"}`}>
            {fmtQty(it)}
          </span>
        </button>
        {markSpar && it.store === "Spar" && (
          <span className="shrink-0 text-[10px] uppercase tracking-wide text-rose-500">Spar</span>
        )}
        <button onClick={() => removeItem(it.key)} title="Von der Liste entfernen"
          className="shrink-0 p-1 rounded text-stone-300 hover:text-rose-500 hover:bg-rose-50 transition">
          <X size={15} />
        </button>
      </div>
    );
  };

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <button onClick={() => setWeek((w) => ({ ...w, showList: false }))}
          className="text-sm text-stone-500 hover:text-stone-700 flex items-center gap-1">
          <ChevronUp size={16} className="rotate-[-90deg]" /> zurück zur Auswahl
        </button>
        <div className="text-sm text-stone-400">{done}/{total} erledigt</div>
      </div>

      {hasBiweekly && (
        <label className="flex items-center gap-2 text-sm text-stone-600 bg-white border border-stone-200 rounded-lg px-3 py-2 cursor-pointer">
          <input type="checkbox" checked={includeBiweekly}
            onChange={(e) => setWeek((w) => ({ ...w, includeBiweekly: e.target.checked }))}
            className="accent-emerald-600" />
          Alle-2-Wochen-Artikel diese Woche dazurechnen
          <span className="text-stone-400">· {includeBiweekly ? "dabei" : "diesmal nicht"}</span>
        </label>
      )}

      {/* HOFER – als Weg durch den Markt */}
      <section>
        <h2 className="section-title flex items-center gap-2 mb-1">
          <span className="w-2.5 h-2.5 rounded-full bg-emerald-500" /> Hofer
        </h2>
        <p className="text-xs text-stone-400 mb-4">In deiner Reihenfolge durch den Markt.</p>

        {hofer.length === 0 && <Empty>Keine Hofer-Artikel.</Empty>}
        <ol className="route">
          {hofer.map((g, idx) => (
            <li key={g.cat} className="route-stop">
              <div className="route-num">{String(idx + 1).padStart(2, "0")}</div>
              <div className="flex-1 pb-4">
                <div className="text-xs font-semibold uppercase tracking-wide text-emerald-700 mb-0.5">{g.cat}</div>
                <div className="divide-y divide-stone-100">
                  {g.items.map((it) => <Item key={it.key} it={it} />)}
                </div>
              </div>
            </li>
          ))}
        </ol>
      </section>

      {/* SPAR – separat */}
      {spar.length > 0 && (
        <section className="p-4 rounded-xl bg-rose-50 border border-rose-200">
          <h2 className="section-title flex items-center gap-2 mb-3 text-rose-700">
            <span className="w-2.5 h-2.5 rounded-full bg-rose-500" /> Nur beim Spar
          </h2>
          {spar.map((g) => (
            <div key={g.cat} className="mb-3 last:mb-0">
              <div className="text-xs font-semibold uppercase tracking-wide text-rose-600 mb-0.5">{g.cat}</div>
              <div className="divide-y divide-rose-100">
                {g.items.map((it) => <Item key={it.key} it={it} />)}
              </div>
            </div>
          ))}
        </section>
      )}

      {removedList.length > 0 && (
        <details className="rounded-xl bg-stone-50 border border-stone-200 px-4 py-3">
          <summary className="text-sm text-stone-500 cursor-pointer select-none">
            Entfernt ({removedList.length}) · zum Zurückholen antippen
          </summary>
          <div className="mt-2 divide-y divide-stone-100">
            {removedList.map((it) => (
              <div key={it.key} className="flex items-center justify-between gap-2 py-1.5">
                <span className="text-sm text-stone-400 line-through">{fmtQty(it)}</span>
                <button onClick={() => restoreItem(it.key)}
                  className="shrink-0 text-xs font-medium text-emerald-600 hover:text-emerald-700 flex items-center gap-1">
                  <RefreshCw size={13} /> zurück
                </button>
              </div>
            ))}
          </div>
        </details>
      )}

      <p className="text-xs text-stone-400">
        Mengen sind grobe Richtwerte je Rezept – passe sie bei den Rezepten/Essentials an, wenn nötig.
      </p>
    </div>
  );
}

function Thumb({ name, size = 44 }) {
  const src = RECIPE_IMAGES[name];
  const style = { width: size, height: size };
  if (src) return <img src={src} alt="" style={style} className="rounded-lg object-cover shrink-0 border border-stone-200" />;
  return (
    <div style={style} className="rounded-lg bg-stone-100 flex items-center justify-center shrink-0 text-stone-300 border border-stone-200">
      <Utensils size={Math.round(size * 0.42)} />
    </div>
  );
}

function RecipesTab({ library, setLibrary }) {
  const [editing, setEditing] = useState(null); // recipe obj or "new"

  const save = (recipe) => {
    setLibrary((l) => {
      const exists = l.recipes.some((r) => r.id === recipe.id);
      return { ...l, recipes: exists ? l.recipes.map((r) => (r.id === recipe.id ? recipe : r)) : [...l.recipes, recipe] };
    });
    setEditing(null);
  };
  const del = (id) => setLibrary((l) => ({ ...l, recipes: l.recipes.filter((r) => r.id !== id) }));

  if (editing) {
    return (
      <RecipeEditor
        recipe={editing === "new" ? { id: uid(), name: "", tag: "", ingredients: [] } : editing}
        categories={library.categories}
        onSave={save} onCancel={() => setEditing(null)}
      />
    );
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="section-title">Rezeptsammlung</h2>
        <button onClick={() => setEditing("new")}
          className="py-2 px-3 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium flex items-center gap-1.5">
          <Plus size={16} /> Neues Rezept
        </button>
      </div>
      <div className="grid sm:grid-cols-2 gap-3">
        {library.recipes.slice().reverse().map((r) => (
          <div key={r.id} className="p-3 rounded-xl bg-white border border-stone-200">
            <div className="flex items-center gap-3">
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-stone-800">{r.name}</div>
                <div className="text-xs text-stone-400">{r.ingredients.length} Zutaten</div>
              </div>
              <Thumb name={r.name} />
              <div className="flex gap-1 shrink-0">
                <button onClick={() => setEditing(r)} className="p-1.5 rounded-lg hover:bg-stone-100 text-stone-500"><Pencil size={15} /></button>
                <button onClick={() => del(r.id)} className="p-1.5 rounded-lg hover:bg-rose-50 text-rose-400"><Trash2 size={15} /></button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function RecipeEditor({ recipe, categories, onSave, onCancel }) {
  const [name, setName] = useState(recipe.name);
  const [rows, setRows] = useState(recipe.ingredients.length ? recipe.ingredients : [ing("", "", "", categories[0])]);

  const upd = (id, field, val) => setRows((rs) => rs.map((r) => (r.id === id ? { ...r, [field]: val } : r)));
  const addRow = () => setRows((rs) => [...rs, ing("", "", "", categories[0])]);
  const delRow = (id) => setRows((rs) => rs.filter((r) => r.id !== id));

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="section-title">{recipe.name ? "Rezept bearbeiten" : "Neues Rezept"}</h2>
        <button onClick={onCancel} className="p-1.5 rounded-lg hover:bg-stone-100 text-stone-500"><X size={18} /></button>
      </div>

      <input
        value={name} onChange={(e) => setName(e.target.value)} placeholder="Rezeptname"
        className="w-full px-3 py-2.5 rounded-lg border border-stone-200 bg-white font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-200"
      />

      <div className="space-y-2">
        {rows.map((r) => (
          <IngredientRow key={r.id} row={r} categories={categories} upd={upd} del={() => delRow(r.id)} />
        ))}
        <button onClick={addRow} className="text-sm text-emerald-700 hover:text-emerald-800 flex items-center gap-1">
          <Plus size={15} /> Zutat
        </button>
      </div>

      <div className="flex gap-2">
        <button
          onClick={() => onSave({ ...recipe, name: name.trim() || "Neues Rezept", ingredients: rows.filter((r) => r.name.trim()) })}
          className="py-2.5 px-5 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-medium">
          Speichern
        </button>
        <button onClick={onCancel} className="py-2.5 px-5 rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200">Abbrechen</button>
      </div>
    </div>
  );
}

function IngredientRow({ row, categories, upd, del, showFreq }) {
  return (
    <div className="flex flex-wrap gap-2 items-center bg-white border border-stone-200 rounded-lg p-2">
      <input value={row.name} onChange={(e) => upd(row.id, "name", e.target.value)} placeholder="Zutat"
        className="flex-1 min-w-[110px] px-2 py-1.5 text-sm rounded border border-stone-200 focus:outline-none focus:ring-1 focus:ring-emerald-300" />
      <input value={row.qty} onChange={(e) => upd(row.id, "qty", e.target.value)} placeholder="Menge"
        className="w-16 px-2 py-1.5 text-sm rounded border border-stone-200 focus:outline-none focus:ring-1 focus:ring-emerald-300" />
      <select value={row.unit} onChange={(e) => upd(row.id, "unit", e.target.value)}
        className="px-1 py-1.5 text-sm rounded border border-stone-200 bg-white">
        {UNITS.map((u) => <option key={u} value={u}>{u || "—"}</option>)}
      </select>
      <select value={row.category} onChange={(e) => upd(row.id, "category", e.target.value)}
        className="flex-1 min-w-[120px] px-1 py-1.5 text-sm rounded border border-stone-200 bg-white">
        {categories.map((c) => <option key={c} value={c}>{c}</option>)}
      </select>
      <select value={row.store} onChange={(e) => upd(row.id, "store", e.target.value)}
        className={`px-1 py-1.5 text-sm rounded border bg-white ${row.store === "Spar" ? "border-rose-300 text-rose-600" : "border-stone-200"}`}>
        {STORES.map((s) => <option key={s} value={s}>{s}</option>)}
      </select>
      {showFreq && (
        <select value={row.freq || "weekly"} onChange={(e) => upd(row.id, "freq", e.target.value)}
          className="px-1 py-1.5 text-sm rounded border border-stone-200 bg-white">
          <option value="weekly">Jede Woche</option>
          <option value="biweekly">Alle 2 Wochen</option>
        </select>
      )}
      <button onClick={del} className="p-1.5 rounded hover:bg-rose-50 text-rose-400"><Trash2 size={15} /></button>
    </div>
  );
}

/* ================================================================== *
 *  TAB: Essentials
 * ================================================================== */
function EssentialsTab({ library, setLibrary }) {
  const upd = (id, field, val) =>
    setLibrary((l) => ({ ...l, essentials: l.essentials.map((r) => (r.id === id ? { ...r, [field]: val } : r)) }));
  const add = () => setLibrary((l) => ({ ...l, essentials: [...l.essentials, ing("", "", "", l.categories[0])] }));
  const del = (id) => setLibrary((l) => ({ ...l, essentials: l.essentials.filter((r) => r.id !== id) }));

  return (
    <div className="space-y-4">
      <div>
        <h2 className="section-title">Jede Woche dabei</h2>
        <p className="text-sm text-stone-500">Diese Artikel landen automatisch auf jeder Liste. Stell rechts „Alle 2 Wochen" ein, wenn etwas nur jede zweite Woche dazu soll.</p>
      </div>
      <div className="space-y-2">
        {library.essentials.map((r) => (
          <IngredientRow key={r.id} row={r} categories={library.categories} upd={upd} del={() => del(r.id)} showFreq />
        ))}
      </div>
      <button onClick={add} className="text-sm text-emerald-700 hover:text-emerald-800 flex items-center gap-1">
        <Plus size={15} /> Essential hinzufügen
      </button>
    </div>
  );
}

/* ================================================================== *
 *  TAB: Hofer-Reihe (Kategorien-Reihenfolge)
 * ================================================================== */
function SettingsTab({ library, setLibrary }) {
  const [newCat, setNewCat] = useState("");
  const [newRule, setNewRule] = useState("");
  const [newPantry, setNewPantry] = useState("");
  const move = (i, dir) => {
    setLibrary((l) => {
      const c = [...l.categories];
      const j = i + dir;
      if (j < 0 || j >= c.length) return l;
      [c[i], c[j]] = [c[j], c[i]];
      return { ...l, categories: c };
    });
  };
  const addCat = () => {
    const v = newCat.trim();
    if (!v || library.categories.includes(v)) return;
    setLibrary((l) => ({ ...l, categories: [...l.categories, v] }));
    setNewCat("");
  };
  const delCat = (cat) => setLibrary((l) => ({ ...l, categories: l.categories.filter((c) => c !== cat) }));

  const rules = library.storeRules || [];
  const addRule = () => {
    const v = newRule.trim().toLowerCase();
    if (!v || rules.some((r) => r.keyword === v)) return;
    setLibrary((l) => ({ ...l, storeRules: [...(l.storeRules || []), { id: uid(), keyword: v }] }));
    setNewRule("");
  };
  const delRule = (id) => setLibrary((l) => ({ ...l, storeRules: (l.storeRules || []).filter((r) => r.id !== id) }));

  const pantryRules = library.pantryRules || [];
  const addPantry = () => {
    const v = newPantry.trim().toLowerCase();
    if (!v || pantryRules.some((r) => r.keyword === v)) return;
    setLibrary((l) => ({ ...l, pantryRules: [...(l.pantryRules || []), { id: uid(), keyword: v }] }));
    setNewPantry("");
  };
  const delPantry = (id) => setLibrary((l) => ({ ...l, pantryRules: (l.pantryRules || []).filter((r) => r.id !== id) }));

  const [geminiKey, setGeminiKey] = useState(() => { try { return localStorage.getItem("wk:geminiKey") || ""; } catch (_) { return ""; } });
  const [geminiModel, setGeminiModel] = useState(() => { try { return localStorage.getItem("wk:geminiModel") || "gemini-2.5-flash"; } catch (_) { return "gemini-2.5-flash"; } });
  const [savedMsg, setSavedMsg] = useState("");
  const importRef = useRef(null);
  const saveGemini = () => {
    try {
      localStorage.setItem("wk:geminiKey", geminiKey.trim());
      localStorage.setItem("wk:geminiModel", geminiModel.trim() || "gemini-2.5-flash");
      setSavedMsg("Gespeichert"); setTimeout(() => setSavedMsg(""), 2000);
    } catch (e) { setSavedMsg("Konnte nicht speichern"); }
  };
  const exportData = () => {
    try {
      const blob = new Blob([JSON.stringify(library, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "wochenkorb-daten.json"; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) { alert("Export fehlgeschlagen."); }
  };
  const importData = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        if (!obj || !Array.isArray(obj.recipes)) throw new Error("ungueltig");
        setLibrary((l) => ({ ...l, ...obj }));
        alert("Import erfolgreich.");
      } catch (err) { alert("Import fehlgeschlagen: keine gueltige Datei."); }
    };
    reader.readAsText(file);
  };

  return (
    <div className="space-y-8">
      <div>
        <div className="mb-3">
          <h2 className="section-title">KI-Schlüssel (Gemini · kostenlos)</h2>
          <p className="text-sm text-stone-500">
            Für Vorschläge und Foto-/Link-Import. Hol dir einen kostenlosen Schlüssel bei Google AI Studio (aistudio.google.com, ohne Kreditkarte) und füge ihn hier ein – er bleibt nur auf diesem Gerät.
          </p>
        </div>
        <input type="password" value={geminiKey} onChange={(e) => setGeminiKey(e.target.value)}
          placeholder="Gemini API-Schlüssel einfügen"
          className="w-full px-3 py-2 rounded-lg border border-stone-200 bg-white text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-emerald-200" />
        <div className="flex gap-2 items-center">
          <input value={geminiModel} onChange={(e) => setGeminiModel(e.target.value)}
            placeholder="gemini-2.5-flash"
            className="flex-1 px-3 py-2 rounded-lg border border-stone-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-emerald-200" />
          <button onClick={saveGemini} className="py-2 px-4 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium">Speichern</button>
        </div>
        <p className="text-xs text-stone-400 mt-2">{savedMsg || "Modell-Standard: gemini-2.5-flash (gratis). Alternativen: gemini-2.5-flash-lite, gemini-2.0-flash."}</p>
      </div>

      <div>
        <div className="mb-3">
          <h2 className="section-title">Daten sichern / übertragen</h2>
          <p className="text-sm text-stone-500">
            Speichere deine Rezepte &amp; Einstellungen als Datei – z. B. um sie aufs andere Gerät zu bringen. Import ersetzt die aktuellen Daten.
          </p>
        </div>
        <div className="flex gap-2">
          <button onClick={exportData} className="flex-1 py-2 rounded-lg bg-stone-800 hover:bg-stone-900 text-white text-sm font-medium">Export (Datei laden)</button>
          <button onClick={() => importRef.current && importRef.current.click()} className="flex-1 py-2 rounded-lg bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 text-sm font-medium">Import (Datei wählen)</button>
          <input ref={importRef} type="file" accept="application/json,.json" onChange={importData} className="hidden" />
        </div>
      </div>

      <div>
        <div className="mb-3">
          <h2 className="section-title">Ernährung</h2>
          <p className="text-sm text-stone-500">
            Gilt für Web-Vorschläge und importierte Rezepte. Faschiertes, Milch, Sahne und Crème fraîche werden je nach Modus automatisch durch vegane Varianten ersetzt. „Vegetarisch" lässt Käse in den Vorschlägen zu.
          </p>
        </div>
        <select value={library.diet || DEFAULT_DIET}
          onChange={(e) => setLibrary((l) => ({ ...l, diet: e.target.value }))}
          className="w-full sm:w-auto px-3 py-2 rounded-lg border border-stone-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-emerald-200">
          {DIET_OPTIONS.map((d) => <option key={d} value={d}>{d}</option>)}
        </select>
      </div>

      <div>
        <div className="mb-3">
          <h2 className="section-title">Reihenfolge im Hofer</h2>
          <p className="text-sm text-stone-500">So wie du durch den Markt gehst – die Liste sortiert sich genau danach.</p>
        </div>

        <ol className="space-y-2">
          {library.categories.map((cat, i) => (
            <li key={cat} className="flex items-center gap-2 bg-white border border-stone-200 rounded-lg px-3 py-2">
              <span className="wordmark text-emerald-600 w-7 text-center">{String(i + 1).padStart(2, "0")}</span>
              <span className="flex-1 text-sm text-stone-700">{cat}</span>
              <button onClick={() => move(i, -1)} disabled={i === 0} className="p-1 rounded hover:bg-stone-100 text-stone-500 disabled:opacity-30"><ChevronUp size={16} /></button>
              <button onClick={() => move(i, 1)} disabled={i === library.categories.length - 1} className="p-1 rounded hover:bg-stone-100 text-stone-500 disabled:opacity-30"><ChevronDown size={16} /></button>
              <button onClick={() => delCat(cat)} className="p-1 rounded hover:bg-rose-50 text-rose-400"><Trash2 size={15} /></button>
            </li>
          ))}
        </ol>

        <div className="flex gap-2 mt-3">
          <input value={newCat} onChange={(e) => setNewCat(e.target.value)} placeholder="Neue Kategorie / Regal"
            className="flex-1 px-3 py-2 rounded-lg border border-stone-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-emerald-200" />
          <button onClick={addCat} className="py-2 px-4 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium">Hinzufügen</button>
        </div>
      </div>

      {/* Spar-Regeln */}
      <div>
        <div className="mb-3">
          <h2 className="section-title text-rose-700">Immer beim Spar</h2>
          <p className="text-sm text-stone-500">
            Enthält der Name einer Zutat eines dieser Wörter, landet sie automatisch auf der Spar-Liste – auch in neuen oder Instagram-Rezepten. Alles andere kommt vom Hofer.
          </p>
        </div>

        <div className="flex flex-wrap gap-2 mb-3">
          {rules.map((r) => (
            <span key={r.id} className="inline-flex items-center gap-1 text-sm bg-rose-50 text-rose-700 border border-rose-200 rounded-full pl-3 pr-1.5 py-1">
              {r.keyword}
              <button onClick={() => delRule(r.id)} className="rounded-full hover:bg-rose-100 p-0.5"><X size={13} /></button>
            </span>
          ))}
          {rules.length === 0 && <span className="text-sm text-stone-400 italic">Noch keine Regeln.</span>}
        </div>

        <div className="flex gap-2">
          <input value={newRule} onChange={(e) => setNewRule(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addRule()}
            placeholder="z. B. tortellini, hummus, …"
            className="flex-1 px-3 py-2 rounded-lg border border-stone-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-rose-200" />
          <button onClick={addRule} className="py-2 px-4 rounded-lg bg-rose-500 hover:bg-rose-600 text-white text-sm font-medium">Hinzufügen</button>
        </div>
      </div>

      {/* Vorrat-Regeln */}
      <div>
        <div className="mb-3">
          <h2 className="section-title text-amber-700">Vorrat · selten nachkaufen</h2>
          <p className="text-sm text-stone-500">
            Enthält der Name einer Zutat eines dieser Wörter, kommt sie nicht auf die Wochenliste, sondern in den eigenen „Vorrat"-Block – Sachen, die man einmal kauft und länger hat.
          </p>
        </div>

        <div className="flex flex-wrap gap-2 mb-3">
          {pantryRules.map((r) => (
            <span key={r.id} className="inline-flex items-center gap-1 text-sm bg-amber-50 text-amber-800 border border-amber-200 rounded-full pl-3 pr-1.5 py-1">
              {r.keyword}
              <button onClick={() => delPantry(r.id)} className="rounded-full hover:bg-amber-100 p-0.5"><X size={13} /></button>
            </span>
          ))}
          {pantryRules.length === 0 && <span className="text-sm text-stone-400 italic">Noch keine Vorrat-Wörter.</span>}
        </div>

        <div className="flex gap-2">
          <input value={newPantry} onChange={(e) => setNewPantry(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addPantry()}
            placeholder="z. B. haselnüsse, erdnüsse, currypaste …"
            className="flex-1 px-3 py-2 rounded-lg border border-stone-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-amber-200" />
          <button onClick={addPantry} className="py-2 px-4 rounded-lg bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium">Hinzufügen</button>
        </div>
      </div>
    </div>
  );
}

</script>
